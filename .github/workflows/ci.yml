name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt
        shell: bash

      - name: Run test suite
        run: python scripts/run_tests.py -v
        shell: bash

  package-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS bundle
        run: |
          chmod +x scripts/build-macos.sh
          ./scripts/build-macos.sh
        shell: bash

      - name: Smoke check macOS bundle assets
        run: python scripts/check_packaged_assets.py dist/yt-dlp-gui.app
        shell: bash

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows bundle
        run: ./scripts/build-windows.ps1
        shell: pwsh

      - name: Smoke check Windows bundle assets
        run: python scripts/check_packaged_assets.py dist/yt-dlp-gui
        shell: pwsh
