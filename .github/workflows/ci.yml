name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Test Suite
        run: python scripts/run_tests.py -s tests -p "test*.py" -v

  packaging-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            shell: bash
            build_command: ./scripts/build-macos.sh
            bundle_dir: dist/yt-dlp-gui.app
          - os: windows-latest
            shell: pwsh
            build_command: ./scripts/build-windows.ps1
            bundle_dir: dist/yt-dlp-gui
    env:
      PYINSTALLER_CONFIG_DIR: ${{ runner.temp }}/pyinstaller-config
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Packaging Script
        shell: ${{ matrix.shell }}
        run: ${{ matrix.build_command }}

      - name: Verify Packaged Assets
        run: python scripts/check_packaged_assets.py ${{ matrix.bundle_dir }}
